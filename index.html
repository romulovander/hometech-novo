                        const entry = entries[0];

                                videoElement.pause();
                            }
                        } else {
                            if (autoPlay && videoElement.paused) {
                                videoElement.play().catch(() => {});
                            }
                        }
                    },
                    { threshold: 0.5 }
                );

                return () => {
                    if (videoElement) observer.unobserve(videoElement);
                };

                return () => window.removeEventListener('scroll', handleScroll);

            const scrollToCheckout = () => {

                            React.createElement('button', { onClick: () => setIsLoginOpen(true), className: "px-6 py-2.5 rounded-full text-sm font-bold text-blue-100 hover:text-white hover:bg-blue-700 flex items-center gap-2" },
                                React.createElement(Icons.User, { size: 18 }),

                                React.createElement(Icons.User, { size: 24 }),
                                " Área do Aluno"
                            ),
                            React.createElement('button', { onClick: () => { setActiveTab('home'); setIsMenuOpen(false); }, className: 'text-left text-xl font-bold py-3 px-6 rounded-xl w-full ' + (activeTab === 'home' ? 'bg-blue-800 text-orange-400 border border-blue-700' : 'text-white') }, "Quero ser Fundador"),

                            React.createElement('p', null, "© 2024 Nano Franquia Hometech. Todos os direitos reservados."),

        var rootElement = document.getElementById('root');
        if (rootElement) {
